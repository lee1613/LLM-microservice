---
# ── Secret: VULTR API key ─────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
type: Opaque
stringData:
  VULTR_SERVERLESS_INFERENCE_API_KEY: "REPLACE_WITH_YOUR_KEY"
---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-microservice
  labels:
    app: llm-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-microservice
  template:
    metadata:
      labels:
        app: llm-microservice
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: api
          image: lee1613/llm-microservice:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: VULTR_SERVERLESS_INFERENCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: VULTR_SERVERLESS_INFERENCE_API_KEY
            - name: PYTHONIOENCODING
              value: "utf-8"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
# ── Service: LoadBalancer ─────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-microservice-svc
spec:
  type: LoadBalancer
  selector:
    app: llm-microservice
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
